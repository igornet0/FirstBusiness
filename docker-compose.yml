services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: firstbusiness
      POSTGRES_PASSWORD: firstbusiness
      POSTGRES_DB: firstbusiness
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firstbusiness -d firstbusiness"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://firstbusiness:firstbusiness@db:5432/firstbusiness
      PORT: "3001"
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    # По умолчанию API только внутри сети compose (Nginx проксирует /api → backend:3001).
    # Раскомментируйте, если нужен прямой доступ к API с хоста (например 3001:3001):
    # ports:
    #   - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
